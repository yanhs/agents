<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agents — ianprog.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      overflow: hidden;
      background: #09090b;
      color: #e4e4e7;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      display: flex;
      -webkit-font-smoothing: antialiased;
    }

    .sidebar {
      width: 260px;
      min-width: 260px;
      height: 100vh;
      background: #0c0c0f;
      border-right: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 0.85rem;
      font-weight: 600;
      color: #fafafa;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sys-stats {
      display: flex;
      gap: 0.6rem;
      font-size: 0.65rem;
      font-weight: 400;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
    }

    .sys-stats.hidden .val { display: none; }

    .stat { color: #52525b; }
    .stat .val { color: #a1a1aa; }
    .stat.warn .val { color: #fbbf24; }
    .stat.crit .val { color: #f87171; }

    .agent-list { flex: 1; overflow-y: auto; }

    /* ── Card ── */
    .card {
      position: relative;
      cursor: grab;
      user-select: none;
      padding: 6px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.12s, transform 0.15s, box-shadow 0.15s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: rgba(99,102,241,0.15);
    }

    .card:hover { background: rgba(255,255,255,0.025); }

    .card.sel {
      background: rgba(99,102,241,0.07);
      border-left: 2px solid #818cf8;
      padding-left: 8px;
    }

    .card.dragging {
      opacity: 0.85;
      transform: scale(1.02);
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      z-index: 10;
      background: #151518;
    }

    .card.drag-over-top { box-shadow: inset 0 2px 0 #818cf8; }
    .card.drag-over-bot { box-shadow: inset 0 -2px 0 #818cf8; }

    .card-top {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .proj {
      flex: 1;
      min-width: 0;
      font-size: 0.88rem;
      font-weight: 500;
      color: #d4d4d8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .proj.empty { color: #3f3f46; font-weight: 400; }

    .card-btns {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      transition: all 0.3s;
      flex-shrink: 0;
    }

    .dot.working {
      background: #fbbf24;
      box-shadow: 0 0 6px rgba(251,191,36,0.5);
      animation: pulse 2s ease-in-out infinite;
    }

    .dot.idle {
      background: #4ade80;
      box-shadow: 0 0 4px rgba(74,222,128,0.3);
    }

    .dot.off { background: #3f3f46; }

    .oo-tag {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3b82f6;
      box-shadow: 0 0 3px rgba(59,130,246,0.5);
      flex-shrink: 0;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .task {
      font-size: 0.75rem;
      color: #52525b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
      padding-left: 1px;
    }

    .card-btn {
      visibility: hidden;
      width: 16px;
      height: 16px;
      border: none;
      border-radius: 3px;
      background: transparent;
      color: #3f3f46;
      font-size: 0.6rem;
      cursor: pointer;
      line-height: 16px;
      text-align: center;
      transition: all 0.12s;
      flex-shrink: 0;
    }
    .card-btn.edit:hover { background: rgba(129,140,248,0.15); color: #818cf8; }
    .card-btn.del:hover { background: rgba(239,68,68,0.15); color: #f87171; }
    .card-btn.auto { visibility: visible; opacity: 0.3; }
    .card-btn.auto:hover { background: rgba(74,222,128,0.15); color: #4ade80; opacity: 1; }
    .card-btn.auto.active { opacity: 1; color: #4ade80; font-weight: 600; }
    .card:hover .card-btn { visibility: visible; }

    .proj-edit {
      font-size: 0.82rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(129,140,248,0.4);
      border-radius: 3px;
      color: #e4e4e7;
      padding: 1px 4px;
      width: 100%;
      outline: none;
      font-family: inherit;
    }

    /* ── Add buttons ── */
    .add-row {
      display: flex;
      border-top: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    .add-btn {
      flex: 1;
      padding: 8px 10px;
      cursor: pointer;
      color: #3f3f46;
      font-size: 0.78rem;
      text-align: center;
      transition: all 0.12s;
    }

    .add-btn:hover { color: #71717a; background: rgba(255,255,255,0.02); }
    .add-btn.disabled { pointer-events: none; opacity: 0.3; }
    .add-btn + .add-btn { border-left: 1px solid rgba(255,255,255,0.06); }

    /* ── Right area ── */
    .main {
      flex: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      padding: 0.4rem 0.8rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: #0c0c0f;
      flex-shrink: 0;
    }

    .topbar-lbl {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      font-weight: 600;
      color: #818cf8;
    }

    .topbar-info {
      flex: 1;
      font-size: 0.72rem;
      color: #71717a;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .topbar-info b { color: #a1a1aa; font-weight: 500; }

    .btn {
      padding: 0.25rem 0.55rem;
      font-size: 0.65rem;
      font-weight: 500;
      color: #71717a;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.12s;
      flex-shrink: 0;
    }

    .btn:hover { color: #a1a1aa; border-color: rgba(255,255,255,0.14); }

    .wrap { flex: 1; position: relative; }

    .wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
    }

    .ph {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #27272a;
      font-size: 0.8rem;
      pointer-events: none;
    }

    .agent-list::-webkit-scrollbar { width: 3px; }
    .agent-list::-webkit-scrollbar-track { background: transparent; }
    .agent-list::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

    @media (max-width: 700px) {
      html, body { position: fixed; width: 100%; height: 100%; overflow: hidden; }
      body { flex-direction: column; }
      .sidebar { width: 100%; min-width: 100%; height: auto; max-height: 17vh; }
      .main { height: 83vh; display: flex; flex-direction: column; }
      .wrap { position: static; flex: 1; display: flex; flex-direction: column; }
      .wrap iframe { position: static; inset: auto; width: 100%; height: auto; flex: 1; touch-action: manipulation; }
      .sidebar-header { padding: 4px 10px; font-size: 0.75rem; }
      .card { padding: 4px 10px; cursor: pointer; }
      .card-btn { visibility: visible; }
      .proj { font-size: 0.8rem; }
      .task { display: none; }
      .add-row { display: none; }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header">
      Agents <span style="font-size:0.5rem;color:#333" title="version">v7</span>
      <div class="sys-stats" id="sysStats" onclick="this.classList.toggle('hidden');localStorage.setItem('stats-hidden',this.classList.contains('hidden'))">
        <span class="stat" id="cpuStat">CPU <span class="val" id="cpuVal">—</span></span>
        <span class="stat" id="ramStat">RAM <span class="val" id="ramVal">—</span></span>
      </div>
    </div>
    <div class="agent-list" id="list"></div>
    <div class="add-row">
      <div class="add-btn" id="addBtn">+ Claude</div>
      <div class="add-btn" id="addOoBtn">+ Claw</div>
    </div>
  </div>
  <div class="main">
    <div class="topbar" id="topbar" style="display:none">
      <span class="topbar-lbl" id="tNum"></span>
      <div class="topbar-info" id="tInfo"></div>
      <a class="btn" id="tOpen" href="#" target="_blank">Open in tab</a>
    </div>
    <div class="wrap" id="wrap">
      <div class="ph" id="ph">Select an agent</div>
    </div>
  </div>

  <script>
    const CLAUDE_IDS = ['1','2','3','4','5','6','7','8'];
    const OO_IDS = ['9','10'];
    const ALL_IDS = [...CLAUDE_IDS, ...OO_IDS];
    const OO_SET = new Set(OO_IDS);

    const OO_CONFIG = {
      '9':  { path: 'terminal9', name: 'Orchestra Main' },
      '10': { path: 'terminal10', name: 'Orchestra Dev' },
    };

    let order = JSON.parse(localStorage.getItem('agent-order'));
    if (!order || !Array.isArray(order)) order = [...ALL_IDS];
    order = order.filter(id => ALL_IDS.includes(id));

    // Sync order from server
    async function loadServerOrder() {
      try {
        const r = await fetch('/api/terminal-status');
        const d = await r.json();
        if (d._order && Array.isArray(d._order)) {
          order = d._order.filter(id => ALL_IDS.includes(id));
          localStorage.setItem('agent-order', JSON.stringify(order));
          build(); applyData(); syncAddBtn();
        }
      } catch {}
    }

    function save() {
      localStorage.setItem('agent-order', JSON.stringify(order));
      // Save to server for cross-device sync
      fetch('/api/terminal-status', {method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({_order: order})});
    }

    const _isMobile = window.matchMedia('(max-width: 700px)').matches;
    let sel = null, data = {}, dragId = null;
    const list = document.getElementById('list');
    const addBtn = document.getElementById('addBtn');
    const addOoBtn = document.getElementById('addOoBtn');
    if (localStorage.getItem('stats-hidden') === 'true') document.getElementById('sysStats').classList.add('hidden');

    function build() {
      list.innerHTML = '';
      order.forEach(id => {
        const c = document.createElement('div');
        const isOO = OO_SET.has(id);
        c.className = 'card' + (id === sel ? ' sel' : '');
        c.id = 'c' + id;
        c.dataset.aid = id;
        const ooTag = isOO ? '<span class="oo-tag" title="OpenOrchestra"></span>' : '';
        c.innerHTML = `
          <div class="card-top">
            <div class="proj empty" id="p${id}">&nbsp;</div>
            <div class="card-btns">
              <button class="card-btn auto" id="a${id}" title="Auto-detect">A</button>
              <button class="card-btn edit" title="Edit name">✎</button>
              <button class="card-btn del" title="Remove">×</button>
              ${ooTag}<span class="dot off" id="d${id}"></span>
            </div>
          </div>
          <div class="task" id="t${id}"></div>`;

        // Click works on both mobile and desktop
        c.style.cursor = 'pointer';
        c.addEventListener('click', e => {
          if (e.target.closest('.card-btn')) return;
          if (e.target.tagName === 'INPUT') return;
          pick(id);
        });

        // Desktop: drag to reorder
        if (!_isMobile) {
          c.draggable = true;
          c.style.cursor = 'grab';
          c.addEventListener('dragstart', e => { dragId = id; c.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
          c.addEventListener('dragend', () => { dragId = null; c.classList.remove('dragging'); list.querySelectorAll('.card').forEach(el => el.classList.remove('drag-over-top','drag-over-bot')); });
          c.addEventListener('dragover', e => {
            e.preventDefault(); e.dataTransfer.dropEffect = 'move';
            if (c.dataset.aid === dragId) return;
            const mid = c.getBoundingClientRect().top + c.getBoundingClientRect().height / 2;
            c.classList.toggle('drag-over-top', e.clientY < mid);
            c.classList.toggle('drag-over-bot', e.clientY >= mid);
          });
          c.addEventListener('dragleave', () => c.classList.remove('drag-over-top','drag-over-bot'));
          c.addEventListener('drop', e => {
            e.preventDefault();
            if (!dragId || dragId === c.dataset.aid) return;
            order.splice(order.indexOf(dragId), 1);
            let idx = order.indexOf(c.dataset.aid);
            if (e.clientY >= c.getBoundingClientRect().top + c.getBoundingClientRect().height / 2) idx++;
            order.splice(idx, 0, dragId);
            save(); build(); applyData();
          });
        }

        // Button handlers (both mobile & desktop)
        c.querySelector('.card-btn.edit').addEventListener('click', e => {
          e.stopPropagation();
          startEdit(id);
        });
        c.querySelector('.card-btn.auto').addEventListener('click', e => {
          e.stopPropagation();
          const info = data[id]||{};
          if (info.locked) {
            fetch('/api/terminal-status', {method:'POST', headers:{'Content-Type':'application/json'},
              body: JSON.stringify({id, unlock: true})});
          } else {
            fetch('/api/terminal-status', {method:'POST', headers:{'Content-Type':'application/json'},
              body: JSON.stringify({id, project: info.project || info.auto_project || ''})});
          }
        });
        c.querySelector('.card-btn.del').addEventListener('click', e => {
          e.stopPropagation();
          order = order.filter(i => i !== id);
          save();
          if (sel === id) { sel = null; document.getElementById('topbar').style.display = 'none'; }
          build(); applyData(); syncAddBtn();
        });

        list.appendChild(c);
      });
    }

    function syncAddBtn() {
      addBtn.classList.toggle('disabled', CLAUDE_IDS.every(id => order.includes(id)));
      addOoBtn.classList.toggle('disabled', OO_IDS.every(id => order.includes(id)));
    }

    addBtn.addEventListener('click', () => {
      const next = CLAUDE_IDS.find(id => !order.includes(id));
      if (!next) return;
      order.push(next);
      save(); build(); applyData(); syncAddBtn();
    });

    addOoBtn.addEventListener('click', () => {
      const next = OO_IDS.find(id => !order.includes(id));
      if (!next) return;
      order.push(next);
      save(); build(); applyData(); syncAddBtn();
    });

    build();
    syncAddBtn();
    loadServerOrder();

    function pick(id) {
      sel = id;
      order.forEach(i => { const el = document.getElementById('c'+i); if(el) el.classList.toggle('sel', i===id); });
      const info = data[id] || {};
      const isOO = OO_SET.has(id);
      document.getElementById('topbar').style.display = 'flex';
      document.getElementById('tNum').textContent = '#' + id + (isOO ? ' · ' + OO_CONFIG[id]?.name : '');
      if (isOO) info.project = OO_CONFIG[id]?.name || 'Orchestra';
      syncTop(info);
      const path = isOO ? '/' + (OO_CONFIG[id]?.path || 'terminal-oo') : '/' + (info.path || 'terminal');
      document.getElementById('tOpen').href = path;
      const wrap = document.getElementById('wrap');
      const ph = document.getElementById('ph'); if (ph) ph.remove();
      const old = wrap.querySelector('iframe'); if (old) old.remove();
      const f = document.createElement('iframe'); f.src = path;
      wrap.appendChild(f);
      if (_isMobile) enableIframeTouchScroll(f);
      enableClipboardCopy(f);
      const doFocus = () => { try { f.focus(); f.contentWindow?.focus(); } catch(e) {} };
      f.addEventListener('load', doFocus);
      f.addEventListener('mousedown', doFocus);
      document.addEventListener('click', e => { if (wrap.contains(e.target) || e.target === f) doFocus(); });
    }

    /* ── Touch scroll for xterm.js inside iframe ── */
    function enableIframeTouchScroll(iframe) {
      iframe.addEventListener('load', () => {
        let attempts = 0;
        const poll = setInterval(() => {
          if (++attempts > 50) { clearInterval(poll); return; }
          try {
            const win = iframe.contentWindow;
            const doc = iframe.contentDocument || win.document;
            const screen = doc.querySelector('.xterm-screen');
            const term = win.term;
            const ms = term?._core?._coreMouseService;
            if (!screen || !ms) return;
            clearInterval(poll);

            const cols = term.cols, rows = term.rows;
            const col = Math.floor(cols / 2), row = Math.floor(rows / 2);
            let startY = 0, lastY = 0, scrolling = false, accum = 0;

            screen.addEventListener('touchstart', e => {
              if (e.touches.length !== 1) return;
              startY = lastY = e.touches[0].clientY;
              scrolling = false;
              accum = 0;
            }, {passive: true});

            screen.addEventListener('touchmove', e => {
              if (e.touches.length !== 1) return;
              const y = e.touches[0].clientY;
              if (!scrolling && Math.abs(startY - y) < 8) return;
              scrolling = true;
              const dy = lastY - y;
              lastY = y;
              accum += dy;
              const lines = Math.trunc(accum / 20);
              if (lines === 0) return;
              accum -= lines * 20;
              const back = lines < 0;
              const count = Math.abs(lines);
              const evt = back
                ? {col, row, x: col, y: row, button: 4, action: 0, ctrl: false, alt: false, shift: false}
                : {col, row, x: col, y: row, button: 5, action: 1, ctrl: false, alt: false, shift: false};
              for (let i = 0; i < count; i++) ms.triggerMouseEvent(evt);
              e.preventDefault();
            }, {passive: false});
          } catch(e) { clearInterval(poll); }
        }, 100);
      });
    }

    /* ── Clipboard: after mouse selection in tmux, copy buffer to system clipboard ── */
    function enableClipboardCopy(iframe) {
      iframe.addEventListener('load', () => {
        let attempts = 0;
        const poll = setInterval(() => {
          if (++attempts > 50) { clearInterval(poll); return; }
          try {
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            if (!doc.querySelector('.xterm')) return;
            clearInterval(poll);
            let lastBuf = '';
            doc.addEventListener('mouseup', () => {
              setTimeout(() => {
                fetch(location.origin + '/api/tmux-buffer/?session=global')
                  .then(r => r.json())
                  .then(d => {
                    if (d.text && d.text !== lastBuf && d.text.trim()) {
                      lastBuf = d.text;
                      navigator.clipboard.writeText(d.text).catch(() => {});
                    }
                  }).catch(() => {});
              }, 300);
            });
          } catch(e) { clearInterval(poll); }
        }, 100);
      });
    }

    function syncTop(info) {
      const el = document.getElementById('tInfo');
      const p = info.project||'', t = info.task||'';
      el.innerHTML = p ? '<b>'+esc(p)+'</b>'+(t?' &mdash; '+esc(t):'') : t?esc(t):'';
    }

    function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

    function startEdit(id) {
      const pe = document.getElementById('p'+id);
      if (!pe || pe.querySelector('input')) return;
      const info = data[id]||{};
      const cur = info.project||'';
      const auto = info.auto_project||'';
      const inp = document.createElement('input');
      inp.className = 'proj-edit';
      inp.value = cur;
      inp.placeholder = auto ? 'Auto: '+auto : 'Project name';
      pe.textContent = '';
      pe.appendChild(inp);
      inp.focus();
      inp.select();

      function commit() {
        const val = inp.value.trim();
        if (val) {
          fetch('/api/terminal-status', {method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({id, project: val})});
        } else {
          fetch('/api/terminal-status', {method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({id, unlock: true})});
        }
        pe.textContent = val || auto || '';
        pe.classList.toggle('empty', !val && !auto);
      }
      inp.addEventListener('keydown', e => { if(e.key==='Enter') inp.blur(); if(e.key==='Escape'){pe.textContent=cur; pe.classList.toggle('empty',!cur);} });
      inp.addEventListener('blur', commit);
    }

    function applyData() {
      order.forEach(id => {
        const info = data[id]||{};
        const isOO = OO_SET.has(id);
        if (isOO && !data[id]) {
          info.project = OO_CONFIG[id]?.name || 'Orchestra';
          info.active = true;
        }
        const dot = document.getElementById('d'+id);
        if(dot) dot.className = 'dot '+(!info.active?'off':info.working?'working':'idle');
        const pe = document.getElementById('p'+id);
        if(pe && !pe.querySelector('input')){ pe.textContent = info.project||''; pe.classList.toggle('empty',!info.project); }
        const te = document.getElementById('t'+id);
        if(te) te.textContent = info.task||'';
        const ae = document.getElementById('a'+id);
        if(ae) ae.classList.toggle('active', !info.locked);
        if(id===sel) syncTop(info);
      });
    }

    function refresh(d) {
      if (d._system) {
        const s = d._system;
        document.getElementById('cpuVal').textContent = s.cpu_pct + '%';
        document.getElementById('ramVal').textContent = s.ram_used_mb + '/' + s.ram_total_mb + 'M';
        document.getElementById('cpuStat').className = 'stat' + (s.cpu_pct > 90 ? ' crit' : s.cpu_pct > 70 ? ' warn' : '');
        document.getElementById('ramStat').className = 'stat' + (s.ram_pct > 90 ? ' crit' : s.ram_pct > 70 ? ' warn' : '');
        delete d._system;
      }
      if (d._order) { delete d._order; }
      data=d; applyData();
    }

    async function poll() { try { refresh(await(await fetch('/api/terminal-status')).json()); } catch{} }
    poll(); setInterval(poll, 4000);

    let _v=null;
    setInterval(async()=>{ try{ const v=await(await fetch('/api/page-version')).text(); if(_v&&v!==_v) location.reload(); _v=v; }catch{} }, 1500);
  </script>
</body>
</html>
